<div class="chat-app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <app-conversation-list></app-conversation-list>
  </aside>

  <!-- Main chat panel -->
  <main class="main-panel">
    @if (chatService.selectedConversation()) {
      <app-chat-window></app-chat-window>
    } @else {
      <div class="empty-state">
        <div class="empty-state__visual">⚡</div>
        <h2 class="empty-state__title">Welcome to PulseChat</h2>
        <p class="empty-state__subtitle">
          Select a conversation from the sidebar, or start a new one using the edit button.
        </p>
      </div>
    }
  </main>

</div>
